<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DARK ROBATTLE</title>
</head>
<body>
  <div id="app">
    <!-- タイトル画面 -->
    <div id="title-screen">
      <h1>DARK ROBATTLE</h1>
      <p class="subtitle">闇のロボトル、開幕</p>
      <div id="team-select"></div>
      <button id="start-btn" class="btn">BATTLE START</button>
    </div>

    <!-- バトル画面 -->
    <div id="battle-screen">
      <div id="battle-header">
        <span class="turn-info">---</span>
        <span>DARK ROBATTLE</span>
      </div>
      <div id="canvas-wrapper">
        <canvas id="game-canvas"></canvas>
      </div>
      <div id="hud"></div>
      <div id="action-menu"></div>
      <div id="message-log-wrapper">
        <div id="message-log-handle"></div>
        <div id="message-log"></div>
      </div>
    </div>

    <!-- 結果オーバーレイ -->
    <div id="result-overlay">
      <h2>VICTORY</h2>
      <button id="retry-btn" class="btn">RETRY</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
